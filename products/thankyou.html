<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Immense Air</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0B1732;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .thankyou-card {
            background: #fff;
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .thankyou-card .icon {
            font-size: 80px;
            color: #FF6A00;
            margin-bottom: 20px;
        }
        .thankyou-card h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0B1732;
        }
        .thankyou-card p {
            color: #6C757D;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .thankyou-card .btn {
            background: linear-gradient(135deg, #FF6A00, #FF8C00);
            color: #fff;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .thankyou-card .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 106, 0, 0.35);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="thankyou-card">
        <div class="icon">✅</div>
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully. <br>Our team will get back to you within 24 hours.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
